<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Kanomori{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, sans-serif; max-width: 880px; margin: 2rem auto;
           padding: 0 1rem; line-height: 1.5; }
    h1 a { color: inherit; text-decoration: none; }
    form { margin: 1rem 0; display: flex; gap: .5rem; flex-wrap: wrap; align-items: center; }
    input[type=text] { flex: 1; min-width: 12rem; padding: .5rem; font-size: 1rem; }
    button { padding: .5rem 1rem; font-size: 1rem; cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .55; }
    .recording-status { min-height: 1.5rem; font-size: .9rem; opacity: .78; }
    .recording-status[data-state="error"] { color: #b00020; opacity: 1; }
    .card { border: 1px solid #8884; border-radius: 8px; padding: .75rem 1rem; margin: .75rem 0; }
    .card .meta { font-size: .85rem; opacity: .75; }
    .badge { display: inline-block; font-size: .75rem; padding: .1rem .5rem; margin-right: .3rem;
             border-radius: 999px; background: #8883; }
    .ts { font-variant-numeric: tabular-nums; font-weight: 600; }
    .frame-strip { display: flex; gap: .4rem; overflow-x: auto; margin: .5rem 0; }
    .frame-strip img { height: 90px; border-radius: 4px; }
    .empty { opacity: .6; font-style: italic; }
  </style>
</head>
<body>
  <h1><a href="/">鹿乃 Kanomori</a></h1>
  <p class="meta">Moment-level retrieval — find the stream and timestamp from a fragment.</p>
  {% block content %}{% endblock %}
</body>
</html>
